name: CI Scheduler and Maintenance

on:
  schedule:
    - cron: '*/5 * * * *'      # every 5 minutes: heartbeat
    - cron: '0 2 * * *'        # daily at 02:00 UTC: nightly scan
    - cron: '0 3 * * 0'        # weekly Sunday 03:00 UTC: dependency & vuln checks
  push:
    branches: [ main ]

jobs:
  ci-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile check
        run: |
          python -m compileall src
      - name: Unit tests
        run: |
          pytest -q

  heartbeat:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && contains(github.event.schedule, '*/5 * * * *')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run heartbeat task
        env:
          ARCHON_X_WEBHOOK_URL: ${{ secrets.ARCHON_X_WEBHOOK_URL }}
          ARCHON_X_WEBHOOK_SECRET: ${{ secrets.ARCHON_X_WEBHOOK_SECRET }}
        run: |
          python scripts/jobs/run_heartbeat.py

  nightly-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && contains(github.event.schedule, '0 2 * * *')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run repository scan
        run: |
          python scripts/jobs/run_repo_scan.py
      - name: Upload scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-scan
          path: artifacts/*.json

  weekly-audit:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && contains(github.event.schedule, '0 3 * * 0')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pip-audit bandit
      - name: Dependency & vulnerability check
        run: |
          python scripts/jobs/run_dependency_audit.py

  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run minimal smoke tests
        run: |
          python scripts/jobs/run_smoke_tests.py
