[STORAGE]
SQLITE_DB = "data/db/devika.db"
SCREENSHOTS_DIR = "data/screenshots"
PDFS_DIR = "data/pdfs"
PROJECTS_DIR = "data/projects"
LOGS_DIR = "data/logs"
REPOS_DIR = "data/repos"

[API_KEYS]
BING = "<YOUR_BING_API_KEY>"
GOOGLE_SEARCH = "<YOUR_GOOGLE_SEARCH_API_KEY>"
GOOGLE_SEARCH_ENGINE_ID = "<YOUR_GOOGLE_SEARCH_ENGINE_ID>"
CLAUDE = "<YOUR_CLAUDE_API_KEY>"
OPENAI = "<YOUR_OPENAI_API_KEY>"
GEMINI = "<YOUR_GEMINI_API_KEY>"
MISTRAL = "<YOUR_MISTRAL_API_KEY>"
GROQ = "<YOUR_GROQ_API_KEY>"
NETLIFY = "<YOUR_NETLIFY_API_KEY>"
BRIGHTDATA_MCP = "<YOUR_BRIGHTDATA_MCP_API_KEY>"
ARCHON_X_WEBHOOK_SECRET = ""

[API_ENDPOINTS]
BING = "https://api.bing.microsoft.com/v7.0/search"
GOOGLE = "https://www.googleapis.com/customsearch/v1"
OLLAMA = "http://127.0.0.1:11434"

LM_STUDIO = "http://localhost:1234/v1"
OPENAI = "https://api.openai.com/v1"
BRIGHTDATA_MCP = ""
BRENNER_HTTP = ""
ARCHON_X_WEBHOOK = ""


[LOGGING]
LOG_REST_API = "true"
LOG_PROMPTS = "false"

[TIMEOUT]
INFERENCE = 60

[FEATURES]
# Enable/disable ACIP prompt-injection checks (true/false)
ACIP_ENABLED = "true"
# Enable/disable Destructive Command Guard on all shell commands
DCG_ENABLED = "true"
# Path to local ms (Meta Skill) CLI binary; leave empty to disable
MS_BINARY = ""
# Path to local mdwb (markdown_web_browser) CLI binary; leave empty to disable
MDWB_BINARY = ""

# Clawbot / Flywheel integration
CLAW_REPO_URL = "https://github.com/executiveusa/clawdbot-Whatsapp-agent.git"
CLAW_HEART_PATH = "src/synthia/claw/heart.json"
CLAW_SOUL_PATH = "src/synthia/claw/soul.json"

# Ralphy / Flywheel references
RALPHY_REPO_URL = "https://github.com/michaelshimeles/ralphy.git"
FLYWHEEL_SETUP_URL = "https://github.com/Dicklesworthstone/agentic_coding_flywheel_setup.git"
AGENT_FLYWHEEL_SITE = "https://agent-flywheel.com/"
RALPHY_LOOP_ENABLED = "true"
BRENNER_SIMULATE = "true"

[SCHEDULER]
ENABLED = "true"
DB_PATH = "data/scheduler/jobs.sqlite"
HEARTBEAT_SECONDS = 60
MEMORY_SYNC_SECONDS = 300
REPO_SCAN_SECONDS = 86400